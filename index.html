<!DOCTYPE html>
<html lang="fr" class="dark-mode">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Halim</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-base: #020617; --card-bg: rgba(15, 23, 42, 0.7); --card-border: rgba(30, 58, 138, 0.5);
            --text-main: #f8fafc; --text-muted: #94a3b8; --primary-blue: #3b82f6; --accent-blue: #60a5fa;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-base); color: var(--text-main); margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        /* Splash Screen */
        #splash { position: fixed; inset: 0; background: var(--bg-base); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .welcome-text { font-size: 3rem; font-weight: 800; color: var(--primary-blue); }

        /* UI */
        #app { opacity: 0; max-width: 1000px; margin: 40px auto; padding: 20px; }
        .glass { background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid var(--card-border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        
        /* Nav */
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .tab-btn { background: none; border: 1px solid var(--card-border); color: var(--text-muted); padding: 10px 20px; border-radius: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .tab-btn.active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }

        /* Grid / Components */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day { aspect-ratio: 1; border: 1px solid var(--card-border); display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; }
        .day.has-task { background: var(--primary-blue); color: white; }
        
        input, textarea { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--card-border); padding: 12px; border-radius: 10px; color: white; margin-bottom: 10px; }
        button.add-btn { background: var(--primary-blue); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
        
        footer { text-align: center; color: var(--text-muted); padding: 20px; margin-top: 50px; font-size: 0.9em; }
    </style>
</head>
<body>

    <div id="splash"><h1 class="welcome-text">Bienvenue Halim</h1></div>

    <div id="app">
        <header style="display:flex; justify-content:space-between; align-items:center;">
            <h1>Dashboard</h1>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchView('tasks')"><i data-lucide="check-square"></i> Tâches</button>
                <button class="tab-btn" onclick="switchView('calendar')"><i data-lucide="calendar"></i> Planning</button>
                <button class="tab-btn" onclick="switchView('notes')"><i data-lucide="sticky-note"></i> Notes</button>
            </div>
        </header>

        <!-- Tasks -->
        <div id="tasks-view" class="view">
            <div class="glass">
                <input type="text" id="taskInput" placeholder="Nouvelle tâche...">
                <input type="date" id="dateInput">
                <button class="add-btn" onclick="addTask()"><i data-lucide="plus"></i> Ajouter</button>
            </div>
            <div id="taskList"></div>
        </div>

        <!-- Calendar -->
        <div id="calendar-view" class="view" style="display:none;">
            <div class="glass">
                <h3 id="cal-month">Juin 2026</h3>
                <div class="calendar-grid" id="cal-grid"></div>
            </div>
        </div>

        <!-- Notes -->
        <div id="notes-view" class="view" style="display:none;">
            <div class="glass">
                <textarea id="noteInput" rows="4" placeholder="Prendre une note..."></textarea>
                <button class="add-btn" onclick="addNote()"><i data-lucide="save"></i> Enregistrer</button>
            </div>
            <div id="noteList"></div>
        </div>

        <footer>Fait par Nassim</footer>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let notes = JSON.parse(localStorage.getItem('notes')) || [];

        window.onload = () => {
            lucide.createIcons();
            const tl = gsap.timeline();
            tl.to(".welcome-text", { opacity: 0, delay: 1 })
              .to("#splash", { yPercent: -100, duration: 1, ease: "power4.inOut" })
              .to("#app", { opacity: 1, duration: 1 });
            render();
        };

        function switchView(view) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`${view}-view`).style.display = 'block';
            event.currentTarget.classList.add('active');
            render();
        }

        function addTask() {
            const task = { text: document.getElementById('taskInput').value, date: document.getElementById('dateInput').value };
            if(!task.text) return;
            tasks.push(task);
            localStorage.setItem('tasks', JSON.stringify(tasks));
            render();
        }

        function addNote() {
            const content = document.getElementById('noteInput').value;
            if(!content) return;
            notes.push(content);
            localStorage.setItem('notes', JSON.stringify(notes));
            render();
        }

        function render() {
            // Render Tasks
            const tList = document.getElementById('taskList');
            tList.innerHTML = tasks.map(t => `<div class="glass">${t.text} - <strong>${t.date}</strong></div>`).join('');
            
            // Render Notes
            const nList = document.getElementById('noteList');
            nList.innerHTML = notes.map(n => `<div class="glass">${n}</div>`).join('');

            // Render Calendar
            const grid = document.getElementById('cal-grid');
            grid.innerHTML = '';
            for(let i = 1; i <= 30; i++) {
                const dateStr = `2026-06-${i.toString().padStart(2, '0')}`;
                const hasTask = tasks.find(t => t.date === dateStr);
                grid.innerHTML += `<div class="day ${hasTask ? 'has-task' : ''}">${i}</div>`;
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
