<!DOCTYPE html>
<html lang="fr" class="dark-mode">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Halim</title>
    <!-- GSAP & Lucide -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #020617;
            --glass: rgba(15, 23, 42, 0.7);
            --border: rgba(30, 58, 138, 0.5);
            --blue: #3b82f6;
            --white: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; overflow-x: hidden; }

        /* Splash Screen Bicolor */
        #splash { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 999; }
        .welcome-title { font-size: 4rem; font-weight: 800; }
        .text-blue { color: var(--blue); }

        /* Background Animé */
        .bg-mesh { position: fixed; inset: 0; z-index: -1; overflow: hidden; filter: blur(80px); }
        .blob { position: absolute; width: 400px; height: 400px; background: var(--blue); border-radius: 50%; opacity: 0.4; }

        /* App Layout */
        #app { opacity: 0; max-width: 1200px; margin: 0 auto; padding: 40px; }
        .grid { display: grid; grid-template-columns: 250px 1fr; gap: 30px; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 25px; }

        /* Components */
        .nav-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px; background: transparent; border: none; color: #94a3b8; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .nav-btn.active { color: var(--blue); background: rgba(59, 130, 246, 0.1); border-radius: 10px; }
        
        /* Calendar UI */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .grid-cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day { aspect-ratio: 1; border: 1px solid var(--border); display: flex; justify-content: center; align-items: center; border-radius: 10px; cursor: pointer; }
        .day:hover { background: var(--blue); }

        footer { text-align: center; color: #475569; margin-top: 50px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="splash">
        <h1 class="welcome-title">Bienvenue <span class="text-blue">Halim</span></h1>
    </div>

    <div class="bg-mesh">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div id="app">
        <div class="grid">
            <!-- Sidebar -->
            <div class="glass">
                <nav>
                    <button class="nav-btn active" onclick="show('dashboard')"><i data-lucide="layout"></i> Dashboard</button>
                    <button class="nav-btn" onclick="show('calendar')"><i data-lucide="calendar"></i> Calendrier</button>
                </nav>
            </div>

            <!-- Main Content -->
            <div class="glass" id="content">
                <!-- Dashboard View -->
                <div id="dashboard-view">
                    <h2>Tâches</h2>
                    <div style="margin-top:20px;">
                        <input type="text" id="tInput" placeholder="Ajouter une tâche..." style="width:100%; padding:10px; background:transparent; border:1px solid var(--border); color:white; border-radius:8px;">
                        <div id="tList" style="margin-top:20px;"></div>
                    </div>
                </div>

                <!-- Calendar View -->
                <div id="calendar-view" style="display:none;">
                    <div class="cal-header">
                        <button onclick="changeMonth(-1)"><i data-lucide="chevron-left"></i></button>
                        <h3 id="monthName">Juin 2026</h3>
                        <button onclick="changeMonth(1)"><i data-lucide="chevron-right"></i></button>
                    </div>
                    <div class="grid-cal" id="calGrid"></div>
                </div>
            </div>
        </div>
        <footer>Fait par Nassim</footer>
    </div>

    <script>
        // Init
        let currentDate = new Date();
        lucide.createIcons();

        // GSAP Reveal
        const tl = gsap.timeline();
        tl.to(".welcome-title", { opacity: 0, delay: 1.5 })
          .to("#splash", { yPercent: -100, duration: 1, ease: "power4.inOut" })
          .to("#app", { opacity: 1, duration: 1 });

        // Animation Background (Blobs)
        gsap.to(".blob-1", { x: 200, y: 100, duration: 8, repeat: -1, yoyo: true, ease: "sine.inOut" });
        gsap.to(".blob-2", { x: -200, y: -100, duration: 12, repeat: -1, yoyo: true, ease: "sine.inOut" });

        function show(view) {
            document.getElementById('dashboard-view').style.display = view === 'dashboard' ? 'block' : 'none';
            document.getElementById('calendar-view').style.display = view === 'calendar' ? 'block' : 'none';
            
            // Animation de transition de contenu
            gsap.from("#content", { opacity: 0, y: 20, duration: 0.3 });
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function renderCalendar() {
            const grid = document.getElementById('calGrid');
            const monthName = document.getElementById('monthName');
            grid.innerHTML = '';
            
            const month = currentDate.getMonth();
            const year = currentDate.getFullYear();
            monthName.innerText = currentDate.toLocaleString('fr-FR', { month: 'long', year: 'numeric' });
            
            for(let i=1; i<=30; i++) {
                grid.innerHTML += `<div class="day">${i}</div>`;
            }
            gsap.from(".day", { scale: 0.8, opacity: 0, stagger: 0.02, duration: 0.3 });
        }

        function changeMonth(dir) {
            currentDate.setMonth(currentDate.getMonth() + dir);
            renderCalendar();
        }

        // Logic Task simple
        document.getElementById('tInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const div = document.createElement('div');
                div.innerHTML = `<div style="padding:10px; border-bottom:1px solid var(--border)">${e.target.value}</div>`;
                document.getElementById('tList').appendChild(div);
                e.target.value = '';
                gsap.from(div, { x: -20, opacity: 0 });
            }
        });

        renderCalendar();
    </script>
</body>
</html>
